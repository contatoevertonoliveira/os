{% extends 'base.html' %}
{% block content %}
<div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom">
    <h1 class="h5 mb-0">{{ title }}</h1>
    <div class="btn-toolbar mb-2 mb-md-0">
        {% if download_url %}
            <a href="{{ download_url }}" class="btn btn-outline-secondary me-2" target="_blank">
                <i class="fas fa-download"></i> Baixar
            </a>
        {% endif %}
        <button type="button" class="btn btn-outline-secondary" onclick="history.back()">
            <i class="fas fa-arrow-left"></i> Voltar
        </button>
    </div>
</div>

{% if not_found %}
    <div class="alert alert-warning">Registro não encontrado.</div>
{% elif not pdf_url %}
    <div class="alert alert-warning">PDF indisponível.</div>
{% else %}
    <div class="card card-custom">
        <div class="card-body p-0">
            <iframe src="{{ pdf_url }}" style="width: 100%; height: 82vh; border: 0;" title="{{ title }}"></iframe>
        </div>
    </div>
{% endif %}
{% endblock %}
