<tr style="cursor: pointer;"
    data-id="{{ item.id }}"
    data-name="{{ item.name }}"
    data-description="{{ item.description|default:'-' }}"
    ondblclick="openEquipmentModal(this)">
    <td>{{ item.name }}</td>
    <td>{{ item.description|default:"-" }}</td>
    <td>
        <a href="#" class="btn btn-sm btn-outline-primary" title="Editar" onclick="event.stopPropagation(); event.preventDefault(); openEquipmentEditModal({{ item.id }});">
            <i class="fas fa-edit"></i>
        </a>
        {% if request.user.profile.role in 'admin,super_admin' %}
        <button type="button" class="btn btn-sm btn-outline-danger" title="Excluir" onclick="event.stopPropagation(); confirmDelete('{% url 'equipment_delete' item.id %}', '{{ item.name|escapejs }}')">
            <i class="fas fa-trash"></i>
        </button>
        {% endif %}
    </td>
</tr>
