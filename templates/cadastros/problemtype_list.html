{% extends 'base.html' %}

{% block content %}
<div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom">
    <div class="d-flex align-items-center gap-3">
        <div class="page-title-icon" style="display:none;"><i class="fas fa-exclamation-circle"></i></div>
        <h1 class="h2 mb-0">Tipos de Problema</h1>
    </div>
    <div class="btn-toolbar mb-2 mb-md-0">
        <button type="button" id="openProblemTypeCreateBtn" class="btn btn-primary-custom">
            <i class="fas fa-plus"></i> Novo Tipo
        </button>
    </div>
</div>

<div class="card card-custom">
    <div class="card-body">
        <div class="table-responsive">
            <table class="table table-hover">
                <thead>
                    <tr>
                        <th>Nome</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody id="problemTypeTableBody">
                    {% for item in problemtypes %}
                        {% include 'cadastros/_problemtype_row.html' with item=item %}
                    {% empty %}
                    <tr id="problemTypeEmptyRow">
                        <td colspan="2" class="text-center py-4">Nenhum tipo cadastrado.</td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</div>

<!-- Problem Type Detail Modal -->
<div class="modal fade" id="problemTypeDetailModal" tabindex="-1" aria-labelledby="problemTypeDetailModalLabel" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content bg-dark text-light border-secondary">
            <div class="modal-header border-secondary">
                <h5 class="modal-title" id="problemTypeDetailModalLabel"><i class="fas fa-exclamation-circle me-2 jf-modal-icon-accent"></i>Detalhes do Tipo de Problema</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <div class="mb-3">
                    <label class="fw-bold text-secondary small">NOME DO TIPO DE PROBLEMA</label>
                    <div id="modalName" class="fs-5"></div>
                </div>
            </div>
            <div class="modal-footer border-secondary">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Fechar</button>
                <button type="button" id="modalEditBtn" class="btn btn-primary">Editar</button>
            </div>
        </div>
    </div>
</div>

<!-- Problem Type Create/Edit Modal (carregado via AJAX, sem navegar para outra página) -->
<div class="modal fade" id="problemTypeFormModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content border-0 shadow-lg" id="problemTypeFormModalContent">
            <!-- injetado via JS -->
        </div>
    </div>
</div>

<script>
    let currentProblemTypeId = null;

    function openProblemTypeModal(row) {
        currentProblemTypeId = row.getAttribute('data-id');
        document.getElementById('modalName').textContent = row.getAttribute('data-name');

        const modal = new bootstrap.Modal(document.getElementById('problemTypeDetailModal'));
        modal.show();
    }

    document.addEventListener('DOMContentLoaded', function() {
        const createBtn = document.getElementById('openProblemTypeCreateBtn');
        const detailModalEl = document.getElementById('problemTypeDetailModal');
        const formModalEl = document.getElementById('problemTypeFormModal');
        const formModalContent = document.getElementById('problemTypeFormModalContent');
        const modalEditBtn = document.getElementById('modalEditBtn');

        if (!formModalEl || !formModalContent) return;

        const formModal = new bootstrap.Modal(formModalEl, { backdrop: 'static' });
        const detailModal = detailModalEl ? bootstrap.Modal.getOrCreateInstance(detailModalEl) : null;

        function modalFormUrl(pk) {
            return pk ? `/problemtypes/modal/${pk}/` : '/problemtypes/modal/';
        }

        async function loadFormModal(pk) {
            formModalContent.innerHTML = `
                <div class="text-center p-5 text-muted">
                    <div class="spinner-border text-primary" role="status"></div>
                    <div class="small mt-2">Carregando formulário...</div>
                </div>
            `;
            formModal.show();
            const resp = await fetch(modalFormUrl(pk), { headers: { 'X-Requested-With': 'XMLHttpRequest' } });
            formModalContent.innerHTML = await resp.text();
        }

        window.openProblemTypeEditModal = function(pk) {
            if (detailModal) detailModal.hide();
            loadFormModal(pk);
        };

        if (createBtn) {
            createBtn.addEventListener('click', function() { loadFormModal(null); });
        }

        if (modalEditBtn) {
            modalEditBtn.addEventListener('click', function() {
                if (currentProblemTypeId) window.openProblemTypeEditModal(currentProblemTypeId);
            });
        }

        formModalContent.addEventListener('submit', async function(e) {
            const form = e.target;
            if (!form || form.id !== 'simpleNameForm') return;
            e.preventDefault();

            const submitBtn = form.querySelector('button[type="submit"]');
            if (submitBtn) submitBtn.disabled = true;

            try {
                const resp = await fetch(form.action, {
                    method: 'POST',
                    body: new FormData(form),
                    headers: { 'X-Requested-With': 'XMLHttpRequest' }
                });

                if (!resp.ok) {
                    const data = await resp.json().catch(() => null);
                    if (data && data.html) {
                        formModalContent.innerHTML = data.html;
                        return;
                    }
                    throw new Error('Erro ao salvar tipo de problema.');
                }

                const data = await resp.json();
                if (!data || data.status !== 'success') {
                    throw new Error((data && data.message) || 'Erro ao salvar tipo de problema.');
                }

                const tbody = document.getElementById('problemTypeTableBody');
                const emptyRow = document.getElementById('problemTypeEmptyRow');
                if (emptyRow) emptyRow.remove();

                const existingRow = tbody.querySelector(`tr[data-id="${data.id}"]`);
                if (existingRow) {
                    existingRow.outerHTML = data.row_html;
                } else {
                    tbody.insertAdjacentHTML('afterbegin', data.row_html);
                }

                formModal.hide();
            } catch (err) {
                if (submitBtn) submitBtn.disabled = false;
                alert(err.message || 'Erro ao salvar tipo de problema.');
            }
        });
    });
</script>

{% endblock %}
