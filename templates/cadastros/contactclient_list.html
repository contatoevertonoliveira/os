{% extends 'base.html' %}

{% block content %}
<div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom">
    <div class="d-flex align-items-center gap-3">
        <div class="page-title-icon" style="display:none;"><i class="fas fa-address-book"></i></div>
        <h1 class="h2 mb-0">Contatos dos Clientes</h1>
    </div>
    <div class="btn-toolbar mb-2 mb-md-0">
        <button type="button" id="openContactClientCreateBtn" class="btn btn-primary-custom">
            <i class="fas fa-plus"></i> Novo Contato
        </button>
    </div>
</div>

<div class="card card-custom">
    <div class="card-body">
        <div class="table-responsive">
            <table class="table table-hover">
                <thead>
                    <tr>
                        <th>Cliente</th>
                        <th>Hub/Loja</th>
                        <th>Nome</th>
                        <th>Email</th>
                        <th>Telefone</th>
                        <th>Ativo</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody id="contactClientTableBody">
                    {% for item in contacts %}
                        {% include 'cadastros/_contactclient_row.html' with item=item %}
                    {% empty %}
                    <tr id="contactClientEmptyRow">
                        <td colspan="7" class="text-center py-4">Nenhum contato cadastrado.</td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</div>

<!-- Contact Client Create/Edit Modal (carregado via AJAX, sem navegar para outra página) -->
<div class="modal fade" id="contactClientFormModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content border-0 shadow-lg" id="contactClientFormModalContent">
            <!-- injetado via JS -->
        </div>
    </div>
</div>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        const createBtn = document.getElementById('openContactClientCreateBtn');
        const formModalEl = document.getElementById('contactClientFormModal');
        const formModalContent = document.getElementById('contactClientFormModalContent');

        if (!formModalEl || !formModalContent) return;

        const formModal = new bootstrap.Modal(formModalEl, { backdrop: 'static' });

        function modalFormUrl(pk) {
            return pk ? `/contacts/clients/modal/${pk}/` : '/contacts/clients/modal/';
        }

        async function loadFormModal(pk) {
            formModalContent.innerHTML = `
                <div class="text-center p-5 text-muted">
                    <div class="spinner-border text-primary" role="status"></div>
                    <div class="small mt-2">Carregando formulário...</div>
                </div>
            `;
            formModal.show();
            const resp = await fetch(modalFormUrl(pk), { headers: { 'X-Requested-With': 'XMLHttpRequest' } });
            formModalContent.innerHTML = await resp.text();
        }

        window.openContactClientEditModal = function(pk) {
            loadFormModal(pk);
        };

        if (createBtn) {
            createBtn.addEventListener('click', function() { loadFormModal(null); });
        }

        formModalContent.addEventListener('submit', async function(e) {
            const form = e.target;
            if (!form || form.id !== 'contactClientForm') return;
            e.preventDefault();

            const submitBtn = form.querySelector('button[type="submit"]');
            if (submitBtn) submitBtn.disabled = true;

            try {
                const resp = await fetch(form.action, {
                    method: 'POST',
                    body: new FormData(form),
                    headers: { 'X-Requested-With': 'XMLHttpRequest' }
                });

                if (!resp.ok) {
                    const data = await resp.json().catch(() => null);
                    if (data && data.html) {
                        formModalContent.innerHTML = data.html;
                        return;
                    }
                    throw new Error('Erro ao salvar contato.');
                }

                const data = await resp.json();
                if (!data || data.status !== 'success') {
                    throw new Error((data && data.message) || 'Erro ao salvar contato.');
                }

                const rowResp = await fetch(`/contacts/clients/${data.contact_id}/row/`, { headers: { 'X-Requested-With': 'XMLHttpRequest' } });
                const rowHtml = await rowResp.text();

                const tbody = document.getElementById('contactClientTableBody');
                const emptyRow = document.getElementById('contactClientEmptyRow');
                if (emptyRow) emptyRow.remove();

                const existingRow = tbody.querySelector(`tr[data-id="${data.contact_id}"]`);
                if (existingRow) {
                    existingRow.outerHTML = rowHtml;
                } else {
                    tbody.insertAdjacentHTML('afterbegin', rowHtml);
                }

                formModal.hide();
            } catch (err) {
                if (submitBtn) submitBtn.disabled = false;
                alert(err.message || 'Erro ao salvar contato.');
            }
        });
    });
</script>

{% endblock %}
