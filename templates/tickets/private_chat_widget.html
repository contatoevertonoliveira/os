{% load static %}
{# Widget de Chat Particular — conversas 1:1 entre usuários logados (estilo Messenger).
   O Jota4 pode ser chamado (por nome) dentro de qualquer conversa para ajudar. #}

{% if user.is_authenticated %}
<div id="pcLauncher" title="Conversas particulares">
    <i class="fas fa-comments"></i>
    <span id="pcLauncherBadge"
          style="display:none;position:absolute;top:-4px;right:-4px;background:#dc3545;color:#fff;
                 border-radius:50%;min-width:18px;height:18px;font-size:.65rem;line-height:18px;
                 text-align:center;padding:0 4px;font-weight:700;"></span>
</div>

<div id="pcPickerPanel"
     style="width:280px;max-height:380px;background:#fff;border-radius:12px;
            box-shadow:0 8px 28px rgba(0,0,0,.2);overflow:hidden;display:none;flex-direction:column;">
    <div style="background:linear-gradient(135deg,#0d6efd,#3b82f6);color:#fff;padding:10px 14px;font-weight:700;font-size:.85rem;">
        Conversas
    </div>
    <div id="pcOnlineList" style="overflow-y:auto;flex:1;padding:6px 0;">
        <div style="padding:14px;text-align:center;color:#888;font-size:.8rem;">Carregando...</div>
    </div>
</div>

<div id="pcPopupsContainer"></div>

<div id="pcToastContainer"></div>

<style>
    #pcToastContainer {
        position: fixed;
        top: 20px;
        right: 20px;
        z-index: 3000;
        display: flex;
        flex-direction: column;
        gap: 8px;
        pointer-events: none;
    }
    .pc-toast {
        pointer-events: auto;
        background: #fff;
        border-left: 4px solid #fd7e14;
        border-radius: 8px;
        box-shadow: 0 6px 20px rgba(0,0,0,.3);
        padding: 10px 14px;
        width: 280px;
        cursor: pointer;
        font-size: .8rem;
        animation: pcToastIn 0.25s ease;
    }
    .pc-toast strong { display: block; margin-bottom: 2px; color: #212529; }
    .pc-toast span { color: #555; }
    @keyframes pcToastIn { from { opacity:0; transform:translateX(20px); } to { opacity:1; transform:translateX(0); } }
    /* Botão fica perto da sidebar (lado esquerdo) para não disputar espaço com o
       FAB de "Nova OS" e o Jota4, que já ocupam o canto inferior direito. */
    #pcLauncher {
        position: fixed;
        bottom: 24px;
        left: calc(var(--sidebar-width, 260px) + 16px);
        z-index: 2049;
        width: 48px;
        height: 48px;
        border-radius: 50%;
        background: linear-gradient(135deg,#0d6efd,#3b82f6);
        box-shadow: 0 4px 14px rgba(0,0,0,.25);
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        color: #fff;
        font-size: 1.15rem;
        transition: left 0.3s;
    }
    /* Ícone pisca em laranja (mesma respiração dos popups) enquanto houver
       conversa com mensagem nova que o usuário ainda nem abriu. */
    #pcLauncher.pc-alerting {
        background: linear-gradient(135deg,#fd7e14,#ffa94d) !important;
        animation: pcBreathe 1.6s ease-in-out infinite;
    }
    #pcPickerPanel {
        position: fixed;
        bottom: 80px;
        left: calc(var(--sidebar-width, 260px) + 16px);
        z-index: 2049;
        transition: left 0.3s;
    }
    #pcPopupsContainer {
        position: fixed;
        bottom: 0;
        left: calc(var(--sidebar-width, 260px) + 16px);
        z-index: 2048;
        display: flex;
        flex-direction: row;
        gap: 10px;
        align-items: flex-end;
        pointer-events: none;
        transition: left 0.3s;
    }
    .sidebar-collapsed #pcLauncher,
    .sidebar-collapsed #pcPickerPanel,
    .sidebar-collapsed #pcPopupsContainer {
        left: 96px;
    }
    @media (max-width: 991px) {
        #pcLauncher, #pcPickerPanel, #pcPopupsContainer {
            left: 12px;
        }
    }
    /* O popup nunca deve poder "sumir" — display/visibility sempre garantidos,
       independente de qualquer classe de alerta aplicada. */
    .pc-popup { pointer-events: auto; display: flex !important; }
    .pc-popup-header { cursor: move; position: relative; }
    @keyframes pcBlink { 0%,100% { box-shadow:0 8px 28px rgba(13,110,253,.25); } 50% { box-shadow:0 8px 28px rgba(13,110,253,.9); } }
    .pc-popup.pc-blink .pc-popup-header { animation: pcBlink 0.9s ease-in-out 4; }
    /* Alerta laranja: popup MINIMIZADO com mensagem não lida. Fundo laranja fixo
       (não anima cor — evita qualquer glitch de repintura) + respiração suave de
       opacidade (esmaece/pisca/esmaece...), intermitente até o usuário reabrir —
       igual ao antigo Messenger piscando a janela minimizada. */
    .pc-popup.pc-alerting .pc-popup-header {
        background: linear-gradient(135deg,#fd7e14,#ffa94d) !important;
    }
    .pc-popup.pc-alerting {
        animation: pcBreathe 1.6s ease-in-out infinite;
    }
    @keyframes pcBreathe {
        0%, 100% { opacity: 1; }
        50%      { opacity: .45; }
    }
    .pc-unread-badge {
        display: none;
        position: absolute;
        top: -6px;
        left: -6px;
        background: #dc3545;
        color: #fff;
        border-radius: 50%;
        min-width: 18px;
        height: 18px;
        font-size: .65rem;
        line-height: 18px;
        text-align: center;
        padding: 0 4px;
        font-weight: 700;
    }
    /* Bolinha de status (online / ausente / offline) */
    .pc-status-dot { width:9px; height:9px; border-radius:50%; display:inline-block; flex-shrink:0; }
    .pc-status-dot.online  { background:#28a745; }
    .pc-status-dot.away    { background:#ffc107; }
    .pc-status-dot.offline { background:#adb5bd; }
    .pc-contact-item { padding:9px 14px; cursor:pointer; font-size:.85rem; display:flex; align-items:center; gap:8px; }
    .pc-contact-item:hover { background:#f1f3f5; }
    .pc-contact-name { flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .pc-contact-preview { font-size:.7rem; color:#888; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .pc-contact-unread { background:#dc3545; color:#fff; border-radius:50%; min-width:16px; height:16px; font-size:.62rem; line-height:16px; text-align:center; padding:0 4px; font-weight:700; }
    .pc-picker-section-title { padding:8px 14px 4px; font-size:.68rem; font-weight:700; color:#888; text-transform:uppercase; }
    .pc-msg-row { display:flex; margin-bottom:6px; }
    .pc-msg-row.me { justify-content:flex-end; }
    .pc-msg-row.other { justify-content:flex-start; }
    .pc-msg-row.ai { justify-content:center; }
    .pc-bubble { max-width:80%; padding:7px 11px; border-radius:12px; font-size:.82rem; line-height:1.35; word-wrap:break-word; }
    .pc-msg-row.me .pc-bubble { background:#0d6efd; color:#fff; border-bottom-right-radius:3px; }
    .pc-msg-row.other .pc-bubble { background:#e9ecef; color:#212529; border-bottom-left-radius:3px; }
    .pc-msg-row.ai .pc-bubble { background:#eafaf1; color:#0a6b3d; border:1px solid #b6ecd0; max-width:90%; }
    .pc-ai-label { font-size:.68rem; font-weight:700; color:#0a6b3d; margin-bottom:2px; display:block; }
</style>

<script>
(function () {
    const openThreadIds   = new Map(); // thread_id -> {el, recipientId, recipientName}
    const openByRecipient = new Map(); // recipient_id -> thread_id
    const lastToastedUnread = new Map(); // thread_id -> unread_count já avisado por toast

    function getCookie(name) {
        const v = `; ${document.cookie}`.split(`; ${name}=`);
        if (v.length === 2) return v.pop().split(';').shift();
        return '';
    }

    function escapeHtml(text) {
        return (text || '')
            .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
            .replace(/\n/g, '<br>');
    }

    // ── Launcher / lista de conversas e colegas ─────────────────────────────
    const launcher = document.getElementById('pcLauncher');
    const picker   = document.getElementById('pcPickerPanel');
    const pickerList = document.getElementById('pcOnlineList');
    let pickerOpen = false;

    function buildContactItem(userId, name, status, unreadCount, preview) {
        const item = document.createElement('div');
        item.className = 'pc-contact-item';
        const dot = status ? `<span class="pc-status-dot ${status}"></span>` : '';
        const unreadBadge = unreadCount ? `<span class="pc-contact-unread">${unreadCount}</span>` : '';
        item.innerHTML = `
            ${dot}
            <div style="min-width:0;flex:1;">
                <div class="pc-contact-name">${escapeHtml(name)}</div>
                ${preview ? `<div class="pc-contact-preview">${escapeHtml(preview)}</div>` : ''}
            </div>
            ${unreadBadge}`;
        item.addEventListener('click', () => {
            picker.style.display = 'none';
            pickerOpen = false;
            window.openPrivateChatPopup(userId, name);
        });
        return item;
    }

    launcher.addEventListener('click', async () => {
        pickerOpen = !pickerOpen;
        picker.style.display = pickerOpen ? 'flex' : 'none';
        if (!pickerOpen) return;
        pickerList.innerHTML = '<div style="padding:14px;text-align:center;color:#888;font-size:.8rem;">Carregando...</div>';
        try {
            const resp = await fetch("{% url 'private_chat_contacts' %}", { headers: { 'X-Requested-With': 'XMLHttpRequest' } });
            const data = await resp.json();
            const threads = (data.ok && data.data && data.data.threads) || [];
            const others  = (data.ok && data.data && data.data.others) || [];

            if (!threads.length && !others.length) {
                pickerList.innerHTML = '<div style="padding:14px;text-align:center;color:#888;font-size:.8rem;">Nenhum colega disponível ainda.</div>';
                return;
            }

            pickerList.innerHTML = '';

            if (threads.length) {
                const title = document.createElement('div');
                title.className = 'pc-picker-section-title';
                title.textContent = 'Conversas';
                pickerList.appendChild(title);
                threads.forEach(t => {
                    pickerList.appendChild(buildContactItem(t.user_id, t.name, t.status, t.unread_count, t.preview));
                });
            }

            if (others.length) {
                const title = document.createElement('div');
                title.className = 'pc-picker-section-title';
                title.textContent = 'Colegas online';
                pickerList.appendChild(title);
                others.forEach(u => {
                    pickerList.appendChild(buildContactItem(u.user_id, u.name, 'online', 0, ''));
                });
            }
        } catch {
            pickerList.innerHTML = '<div style="padding:14px;text-align:center;color:#c00;font-size:.8rem;">Erro ao carregar.</div>';
        }
    });

    // ── Arraste dos popups (mover livremente pela tela) ─────────────────────
    // No primeiro drag real (não um clique simples), o popup sai do fluxo do
    // container (flex, ancorado perto da sidebar) e vira posicionamento livre
    // (position:fixed com left/top), podendo ser movido para qualquer lugar.
    function makeDraggable(popupEl, headerEl, onClick) {
        let dragStart = null;
        let moved = false;

        headerEl.addEventListener('mousedown', (e) => {
            if (e.target.closest('.pc-minimize-btn') || e.target.closest('.pc-close-btn')) return;
            const rect = popupEl.getBoundingClientRect();
            dragStart = { x: e.clientX, y: e.clientY, left: rect.left, top: rect.top };
            moved = false;
            e.preventDefault();
        });

        document.addEventListener('mousemove', (e) => {
            if (!dragStart) return;
            const dx = e.clientX - dragStart.x;
            const dy = e.clientY - dragStart.y;
            if (!moved && (Math.abs(dx) > 4 || Math.abs(dy) > 4)) {
                moved = true;
                popupEl.style.position = 'fixed';
                popupEl.style.left = dragStart.left + 'px';
                popupEl.style.top = dragStart.top + 'px';
                popupEl.style.bottom = 'auto';
                popupEl.style.margin = '0';
            }
            if (moved) {
                popupEl.style.left = (dragStart.left + dx) + 'px';
                popupEl.style.top = (dragStart.top + dy) + 'px';
            }
        });

        document.addEventListener('mouseup', () => {
            if (!dragStart) return;
            if (moved) {
                const rect = popupEl.getBoundingClientRect();
                const maxLeft = Math.max(8, window.innerWidth - rect.width - 8);
                const maxTop = Math.max(8, window.innerHeight - rect.height - 8);
                popupEl.style.left = Math.min(Math.max(parseFloat(popupEl.style.left), 8), maxLeft) + 'px';
                popupEl.style.top = Math.min(Math.max(parseFloat(popupEl.style.top), 8), maxTop) + 'px';
            } else {
                onClick();
            }
            dragStart = null;
        });
    }

    // ── Popups de conversa ───────────────────────────────────────────────────
    function buildPopup(threadId, recipientId, recipientName, status) {
        const wrap = document.createElement('div');
        wrap.className = 'pc-popup';
        wrap.style.cssText = 'width:270px;height:360px;background:#fff;border-radius:12px 12px 0 0;' +
            'box-shadow:0 8px 28px rgba(0,0,0,.22);display:flex;flex-direction:column;overflow:hidden;';

        wrap.innerHTML = `
            <div class="pc-popup-header" style="background:linear-gradient(135deg,#0d6efd,#3b82f6);color:#fff;
                        padding:8px 10px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;">
                <span class="pc-unread-badge">0</span>
                <span style="display:flex;align-items:center;gap:6px;overflow:hidden;flex:1;min-width:0;">
                    <span class="pc-status-dot pc-header-status ${status || 'offline'}"></span>
                    <span style="font-weight:700;font-size:.82rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${escapeHtml(recipientName)}</span>
                </span>
                <div style="display:flex;gap:4px;">
                    <button type="button" class="pc-minimize-btn" title="Minimizar"
                            style="background:rgba(255,255,255,.2);border:none;border-radius:6px;color:#fff;width:22px;height:22px;cursor:pointer;font-size:.7rem;"><i class="fas fa-minus"></i></button>
                    <button type="button" class="pc-close-btn" title="Fechar"
                            style="background:rgba(255,255,255,.2);border:none;border-radius:6px;color:#fff;width:22px;height:22px;cursor:pointer;font-size:.7rem;"><i class="fas fa-times"></i></button>
                </div>
            </div>
            <div class="pc-body" style="flex:1;display:flex;flex-direction:column;overflow:hidden;">
                <div class="pc-messages" style="flex:1;overflow-y:auto;padding:8px;"></div>
                <div style="padding:6px;border-top:1px solid #eee;display:flex;gap:6px;flex-shrink:0;">
                    <input type="text" class="pc-input" placeholder="Escreva uma mensagem..."
                           style="flex:1;border:1px solid #dee2e6;border-radius:16px;padding:5px 12px;font-size:.8rem;outline:none;">
                    <button type="button" class="pc-send-btn"
                            style="background:#0d6efd;border:none;border-radius:50%;width:30px;height:30px;color:#fff;cursor:pointer;">
                        <i class="fas fa-paper-plane" style="font-size:.75rem;"></i>
                    </button>
                </div>
            </div>`;

        const header      = wrap.querySelector('.pc-popup-header');
        const body        = wrap.querySelector('.pc-body');
        const messages    = wrap.querySelector('.pc-messages');
        const input       = wrap.querySelector('.pc-input');
        const sendBtn     = wrap.querySelector('.pc-send-btn');
        const unreadBadge = wrap.querySelector('.pc-unread-badge');
        const statusDot   = wrap.querySelector('.pc-header-status');
        let minimized = false;

        function setStatus(newStatus) {
            statusDot.classList.remove('online', 'away', 'offline');
            statusDot.classList.add(newStatus || 'offline');
        }

        makeDraggable(wrap, header, toggleMinimize);
        wrap.querySelector('.pc-minimize-btn').addEventListener('click', (e) => { e.stopPropagation(); toggleMinimize(); });
        wrap.querySelector('.pc-close-btn').addEventListener('click', (e) => {
            e.stopPropagation();
            openThreadIds.delete(threadId);
            openByRecipient.delete(recipientId);
            lastToastedUnread.delete(threadId);
            wrap.remove();
        });

        function toggleMinimize() {
            minimized = !minimized;
            body.style.display = minimized ? 'none' : 'flex';
            wrap.style.height = minimized ? 'auto' : '360px';
            if (!minimized) {
                // Reabriu (deixou de estar minimizado) — busca o que chegou e já marca como lido
                clearUnread();
                lastToastedUnread.delete(threadId);
                refreshAndMarkRead();
            }
        }

        // Contagem exibida no badge — atualizada a cada ciclo do poll, sem mexer
        // na animação de alerta (que só liga/desliga uma vez, ver startAlerting).
        function setUnread(count) {
            if (count > 0) { unreadBadge.style.display = 'block'; unreadBadge.textContent = count; }
            else unreadBadge.style.display = 'none';
        }

        // Liga o modo de alerta (fundo laranja + respiração) uma única vez —
        // fica ligado continuamente até o usuário reabrir o popup, sem depender
        // de reaplicar a classe a cada poll (mais robusto contra qualquer glitch).
        function startAlerting() {
            wrap.classList.add('pc-alerting');
        }

        function clearUnread() {
            unreadBadge.style.display = 'none';
            wrap.classList.remove('pc-alerting');
        }

        async function refreshAndMarkRead() {
            try {
                const r = await fetch(`{% url 'private_chat_messages' %}?thread_id=${threadId}`, { headers: { 'X-Requested-With': 'XMLHttpRequest' } });
                const d = await r.json();
                if (d.ok) {
                    messages.innerHTML = '';
                    d.data.messages.forEach(m => renderMessage(m, window.__pcCurrentUserId));
                    scrollToBottom();
                    setStatus(d.data.status);
                }
            } catch {}
        }

        function scrollToBottom() { setTimeout(() => { messages.scrollTop = messages.scrollHeight; }, 30); }

        function renderMessage(m, currentUserId) {
            const row = document.createElement('div');
            const isMe = m.sender_id === currentUserId && !m.is_ai_message;
            row.className = 'pc-msg-row ' + (m.is_ai_message ? 'ai' : (isMe ? 'me' : 'other'));
            const bubble = document.createElement('div');
            bubble.className = 'pc-bubble';
            bubble.innerHTML = (m.is_ai_message ? '<span class="pc-ai-label">🤖 Jota4</span>' : '') + escapeHtml(m.content);
            row.appendChild(bubble);
            messages.appendChild(row);
        }

        sendBtn.addEventListener('click', sendMsg);
        input.addEventListener('keydown', (e) => { if (e.key === 'Enter') sendMsg(); });

        async function sendMsg() {
            const text = (input.value || '').trim();
            if (!text) return;
            input.value = '';
            renderMessage({ content: text, sender_id: window.__pcCurrentUserId, is_ai_message: false }, window.__pcCurrentUserId);
            scrollToBottom();
            try {
                const resp = await fetch("{% url 'private_chat_send' %}", {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'X-CSRFToken': getCookie('csrftoken'), 'X-Requested-With': 'XMLHttpRequest' },
                    body: JSON.stringify({ thread_id: threadId, content: text }),
                });
                const data = await resp.json();
                if (data.ok) {
                    if (data.data.clear_private_chat) {
                        // Jota4 limpou o histórico só para este usuário — a mensagem que pediu
                        // isso também some da visão dele, então recomeça a conversa do zero.
                        messages.innerHTML = '';
                        (data.data.messages || []).forEach(m => renderMessage(m, window.__pcCurrentUserId));
                    } else {
                        (data.data.messages || []).slice(1).forEach(m => renderMessage(m, window.__pcCurrentUserId));
                    }
                    scrollToBottom();
                }
            } catch {}
        }

        wrap._renderMessage = renderMessage;
        wrap._messagesEl = messages;
        wrap._scrollToBottom = scrollToBottom;
        wrap._isMinimized = () => minimized;
        wrap._setUnread = setUnread;
        wrap._clearUnread = clearUnread;
        wrap._startAlerting = startAlerting;
        wrap._isAlerting = () => wrap.classList.contains('pc-alerting');
        wrap._refreshAndMarkRead = refreshAndMarkRead;
        wrap._setStatus = setStatus;
        return wrap;
    }

    function repositionPopups() {
        // A pilha (row-reverse) já cuida do posicionamento horizontal automaticamente
    }

    window.openPrivateChatPopup = async function (recipientId, recipientNameHint) {
        if (openByRecipient.has(recipientId)) {
            const existing = openThreadIds.get(openByRecipient.get(recipientId));
            if (existing) { existing.el.scrollIntoView({ block: 'nearest', inline: 'nearest' }); return; }
        }
        try {
            const resp = await fetch("{% url 'private_chat_open' %}", {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'X-CSRFToken': getCookie('csrftoken'), 'X-Requested-With': 'XMLHttpRequest' },
                body: JSON.stringify({ recipient_id: recipientId }),
            });
            const data = await resp.json();
            if (!data.ok) return;
            const { thread_id, recipient_name, status, messages: history } = data.data;
            openPopupWithHistory(thread_id, recipientId, recipient_name || recipientNameHint, history, status);
        } catch {}
    };

    function openPopupWithHistory(threadId, recipientId, recipientName, history, status) {
        if (openThreadIds.has(threadId)) return;
        const container = document.getElementById('pcPopupsContainer');
        const popup = buildPopup(threadId, recipientId, recipientName, status);
        container.appendChild(popup);
        openThreadIds.set(threadId, { el: popup, recipientId, recipientName });
        openByRecipient.set(recipientId, threadId);
        // Acabou de ser visto agora — zera a contagem de "último toast avisado" para
        // que uma futura mensagem nova (depois desta conversa ficar em dia) volte a
        // disparar toast normalmente, em vez de comparar com uma contagem antiga.
        lastToastedUnread.delete(threadId);

        (history || []).forEach(m => popup._renderMessage(m, window.__pcCurrentUserId));
        popup._scrollToBottom();
        repositionPopups();
    }

    function blinkPopup(threadId) {
        const entry = openThreadIds.get(threadId);
        if (!entry) return;
        entry.el.classList.add('pc-blink');
        setTimeout(() => entry.el.classList.remove('pc-blink'), 4000);
    }

    function showToast(threadId, otherUserId, name, preview) {
        const container = document.getElementById('pcToastContainer');
        const toast = document.createElement('div');
        toast.className = 'pc-toast';
        toast.innerHTML = `<strong>💬 ${escapeHtml(name)}</strong><span>${escapeHtml((preview || '').slice(0, 80))}</span>`;
        toast.addEventListener('click', () => {
            toast.remove();
            const entry = openThreadIds.get(threadId);
            if (entry) {
                // Já existe popup (provavelmente minimizado) — só reabre
                if (entry.el._isMinimized()) entry.el.querySelector('.pc-minimize-btn').click();
            } else {
                // Ainda não tinha sido aberto — abre agora (busca histórico e marca como lido)
                window.openPrivateChatPopup(otherUserId, name);
            }
        });
        container.appendChild(toast);
        setTimeout(() => toast.remove(), 6000);
    }

    // ── Poll leve (sem LLM): detecta mensagens novas em qualquer conversa ────
    let _pcPollRunning = false;
    async function pollPrivateChat() {
        if (_pcPollRunning) return;
        _pcPollRunning = true;
        try {
            const resp = await fetch("{% url 'private_chat_poll' %}", { headers: { 'X-Requested-With': 'XMLHttpRequest' } });
            const data = await resp.json();
            if (!data.ok) return;
            const pending = data.data || [];

            const badge = document.getElementById('pcLauncherBadge');
            const totalUnread = pending.reduce((sum, p) => sum + p.unread_count, 0);
            if (totalUnread > 0) { badge.style.display = 'block'; badge.textContent = totalUnread; }
            else badge.style.display = 'none';

            // Ícone do messenger pisca em laranja enquanto existir QUALQUER conversa com
            // mensagem nova ainda não aberta — some assim que o usuário abrir todas.
            let hasUnopenedUnread = false;

            for (const item of pending) {
                try {
                    const entry = openThreadIds.get(item.thread_id);

                    if (!entry) {
                        // Conversa nova (ainda sem popup nenhum aberto) — NÃO abre sozinho.
                        // Só avisa: toast + contador no ícone (que também fica piscando). O popup
                        // só abre quando o usuário clicar no toast, no ícone ou na lista de colegas.
                        hasUnopenedUnread = true;
                        if (item.unread_count > (lastToastedUnread.get(item.thread_id) || 0)) {
                            lastToastedUnread.set(item.thread_id, item.unread_count);
                            showToast(item.thread_id, item.other_user_id, item.other_user_name, item.preview);
                        }
                    } else if (entry.el._isMinimized()) {
                        // Minimizado: NÃO marca como lido (era isso que fazia o contador sumir sozinho).
                        // Liga o alerta (fundo laranja + respiração) uma única vez — fica ligado até o
                        // usuário reabrir — e mantém a contagem do badge sempre atualizada.
                        entry.el._setUnread(item.unread_count);
                        if (!entry.el._isAlerting()) entry.el._startAlerting();
                        // Só mostra um toast novo se a contagem realmente aumentou desde o último aviso
                        // (evita reabrir um toast a cada 4s enquanto a mesma mensagem seguir sem leitura).
                        if (item.unread_count > (lastToastedUnread.get(item.thread_id) || 0)) {
                            lastToastedUnread.set(item.thread_id, item.unread_count);
                            showToast(item.thread_id, item.other_user_id, item.other_user_name, item.preview);
                        }
                    } else {
                        // Visível na tela — busca as mensagens novas, marca como lido e pisca em azul
                        await entry.el._refreshAndMarkRead();
                        blinkPopup(item.thread_id);
                    }
                } catch (itemErr) {
                    // Isola falhas por conversa — um erro num item não pode impedir os demais
                    // de continuarem sendo processados neste ciclo nem nos próximos.
                    console.error('[Private Chat] Erro processando thread', item.thread_id, itemErr);
                }
            }

            launcher.classList.toggle('pc-alerting', hasUnopenedUnread);
        } catch (err) {
            console.error('[Private Chat] Erro no poll:', err);
        } finally {
            _pcPollRunning = false;
        }
    }

    window.__pcCurrentUserId = {{ user.id }};
    setTimeout(pollPrivateChat, 2000);
    setInterval(pollPrivateChat, 4000);
})();
</script>
{% endif %}
